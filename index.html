// ─── Tiny CSV parser that handles quoted fields with commas ────────────────
function parseCSV(text) {
  const rows = [];
  let cur = [""], inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i + 1] === '"') { cur[cur.length - 1] += '"'; i += 2; continue; }
      if (c === '"') { inQ = false; i++; continue; }
      cur[cur.length - 1] += c; i++;
    } else {
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ",") { cur.push(""); i++; continue; }
      if (c === "\n") { rows.push(cur); cur = [""]; i++; continue; }
      if (c === "\r") { i++; continue; }
      cur[cur.length - 1] += c; i++;
    }
  }
  if (cur.length > 1 || cur[0] !== "") rows.push(cur);
  return rows;
}

// Map a row object (from bot's sheets.py schema) to our trade shape.
// Bot headers: Date, Symbol, Mode, Setup, Session, Entry Time, Entry Price,
//              Exit Time, Exit Price, Qty, Cost, P&L, Pct, Reason, RSI, ATR, BE, Result
// Normalize a date string of many possible formats to YYYY-MM-DD.
// Handles: 2026-04-16, 4/16/2026, 04/16/26, Apr 16 2026, 2026-04-16T09:31:00Z, etc.
function normalizeDate(raw) {
  if (!raw) return "";
  const s = String(raw).trim();
  // Already ISO-ish (YYYY-MM-DD…)
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) return `${iso[1]}-${iso[2].padStart(2, "0")}-${iso[3].padStart(2, "0")}`;
  // US format M/D/YYYY or M/D/YY
  const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (us) {
    let [, m, d, y] = us;
    if (y.length === 2) y = (parseInt(y, 10) > 50 ? "19" : "20") + y;
    return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
  }
  // Fallback: Date.parse
  const ts = Date.parse(s);
  if (!Number.isNaN(ts)) {
    const dt = new Date(ts);
    return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
  }
  return s.slice(0, 10);
}

// Normalize a time string to HH:MM[:SS] (24-hour, ET). Seconds preserved when present.
// Handles: 09:31, 9:31, 09:31:00, 9:31 AM, 14:31, 14:31:22,
// and ISO datetimes from the bot's ETH logging (2026-04-21T14:31:00+00:00).
// ISO datetimes with a UTC offset are converted to America/New_York time.
function normalizeTime(raw) {
  if (!raw) return "00:00";
  const s = String(raw).trim();

  // ISO datetime: 2026-04-21T14:31:00(.fff)?(Z|+HH:MM|-HH:MM). Convert UTC → ET.
  // The fractional-seconds group is needed because Python's datetime.isoformat()
  // produces strings like "2026-04-21T14:50:08.562711+00:00".
  //
  // If the timezone suffix is missing, we assume UTC. The bot's crypto trades
  // (ETH/DOGE/SOL) log entry_time as `datetime.now(timezone.utc).isoformat()`,
  // which Google Sheets can silently strip of its timezone suffix when re-exporting
  // the cell as CSV. Without this assumption, those ISO times display as ET and end
  // up 4-5 hours ahead of reality (future-dated trades on the chart).
  //
  // Note: bare HH:MM / HH:MM:SS times (the bot's equity trades) are handled further
  // below and ARE treated as ET, which is correct.
  const isoDt = s.match(/^(\d{4}-\d{2}-\d{2})[T\s](\d{2}):(\d{2})(?::(\d{2}))?(?:\.\d+)?(Z|[+-]\d{2}:?\d{2})?/);
  if (isoDt) {
    const [, , hh, mm, ss = "00", tz] = isoDt;
    // Build a canonical form with an explicit timezone so Date.parse is deterministic
    const tzSuffix = tz || "Z"; // default to UTC when missing
    const canonical = `${s.slice(0, 10)}T${hh}:${mm}:${ss}${tzSuffix}`;
    const parsed = Date.parse(canonical);
    if (Number.isNaN(parsed)) return `${hh}:${mm}`;
    const dt = new Date(parsed);
    // Intl gives us HH:MM:SS in ET regardless of where the browser is
    const et = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/New_York",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(dt);
    // en-US 24-hour with hour12:false sometimes returns "24:MM:SS" at midnight — normalize
    const [h24, m, sec] = et.split(":");
    const hh2 = h24 === "24" ? "00" : h24;
    return sec && sec !== "00" ? `${hh2}:${m}:${sec}` : `${hh2}:${m}`;
  }

  // 24-hour with optional seconds
  const m24 = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m24) {
    const base = `${m24[1].padStart(2, "0")}:${m24[2]}`;
    return m24[3] ? `${base}:${m24[3]}` : base;
  }
  // 12-hour with AM/PM
  const m12 = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM|am|pm)$/);
  if (m12) {
    let h = parseInt(m12[1], 10);
    const pm = /pm/i.test(m12[4]);
    if (pm && h < 12) h += 12;
    if (!pm && h === 12) h = 0;
    const base = `${String(h).padStart(2, "0")}:${m12[2]}`;
    return m12[3] ? `${base}:${m12[3]}` : base;
  }
  return "00:00"; // Unrecognized — fail safely to midnight instead of junk string
}

function rowToTrade(row, idx) {
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z0-9]/g, "");
  const get = (...keys) => {
    for (const k of keys) {
      const nk = norm(k);
      const match = Object.keys(row).find(rk => norm(rk) === nk);
      if (match && row[match] != null && row[match] !== "") return row[match];
    }
    return "";
  };
  const num = (v) => {
    const n = parseFloat(String(v).replace(/[$,]/g, ""));
    return Number.isFinite(n) ? n : 0;
  };
  const dateStr = normalizeDate(get("date"));
  const timeStr = normalizeTime(get("entry_time", "entrytime", "time"));

  // IMPORTANT: the bot's sheet has TWO columns that normalize to "pl":
  //   "P&L $" → normalizes to "pl"
  //   "P&L %" → normalizes to "pl"
  // We must target them explicitly by full normalized key to pick the DOLLAR column.
  // "P&L $" → "pl",  "P&L %" → "pl" (same!), so we walk headers and pick the one whose
  // raw header ends with $ (or simply contains "$"), falling back to the first "pl".
  const pickPnl = () => {
    const keys = Object.keys(row);
    // Prefer any header containing "$" that normalizes near "pl"
    const dollarKey = keys.find(k => /p.?l.*\$|pnl.*\$|\$.*p.?l/i.test(k));
    if (dollarKey && row[dollarKey] !== "") return row[dollarKey];
    // Next: exact "pnl" header
    const pnlKey = keys.find(k => norm(k) === "pnl");
    if (pnlKey && row[pnlKey] !== "") return row[pnlKey];
    // Last resort: first header that normalizes to "pl" (but beware: could be P&L %)
    const plKey = keys.find(k => norm(k) === "pl" && !/%/.test(k));
    if (plKey && row[plKey] !== "") return row[plKey];
    return "";
  };

  return {
    id: idx,
    date: dateStr,
    time: timeStr,
    // timeStr may be HH:MM or HH:MM:SS — ISO parser needs seconds, so append :00 if missing.
    ts: Date.parse(`${dateStr}T${timeStr.length === 5 ? timeStr + ":00" : timeStr}`) || 0,
    ticker: String(get("symbol", "ticker")).trim(),
    mode: String(get("mode", "strategy")).trim() || "—",
    setup: String(get("setup")).trim() || "—",
    entry: num(get("entry_price", "entry$", "entry")),
    exit:  num(get("exit_price", "exit$", "exit")),
    qty:   num(get("qty", "quantity")),
    pnl:   num(pickPnl()),
    reason: String(get("reason")).trim(),
  };
}

function csvToTrades(text) {
  const rows = parseCSV(text).filter(r => r.some(c => c && c.trim() !== ""));
  if (rows.length < 2) return { trades: [], skipped: 0 };
  const headers = rows[0].map(h => h.trim());
  let skipped = 0;
  const trades = [];
  rows.slice(1).forEach((r, i) => {
    const obj = {};
    headers.forEach((h, j) => { obj[h] = r[j] != null ? r[j].trim() : ""; });
    const t = rowToTrade(obj, i + 1);
    // Minimum required: a date and a ticker. Other fields may be empty for
    // in-progress trades or sheet formatting quirks — we keep them.
    if (t.date && t.ticker) trades.push(t);
    else skipped++;
  });
  return { trades, skipped };
}

// Parser for the "Open Positions" sheet tab. Schema is simpler than trades:
// no historical ts needed, no exit price, but carries unrealized P&L and age.
function csvToOpenPositions(text) {
  const rows = parseCSV(text).filter(r => r.some(c => c && c.trim() !== ""));
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z0-9]/g, "");
  const num = (v) => {
    const n = parseFloat(String(v).replace(/[$,]/g, ""));
    return Number.isFinite(n) ? n : 0;
  };

  return rows.slice(1).map((r, i) => {
    const obj = {};
    headers.forEach((h, j) => { obj[h] = r[j] != null ? r[j].trim() : ""; });
    const get = (...keys) => {
      for (const k of keys) {
        const nk = norm(k);
        const match = Object.keys(obj).find(rk => norm(rk) === nk);
        if (match && obj[match] != null && obj[match] !== "") return obj[match];
      }
      return "";
    };

    // Same P&L disambiguation trick as the trade log: prefer the $ column over %
    const pickField = (regex, ...fallbackKeys) => {
      const k = Object.keys(obj).find(h => regex.test(h));
      if (k && obj[k] !== "") return obj[k];
      return get(...fallbackKeys);
    };
    const uPnlDollar = num(pickField(/p.?l.*\$|pnl.*\$|unrealized.*\$/i, "unrealizedpl", "pnl"));
    const uPnlPct    = num(pickField(/p.?l.*%|pnl.*%|unrealized.*%/i, "unrealizedplpercent", "pct"));

    return {
      id: i,
      ticker:       String(get("ticker", "symbol")).trim(),
      mode:         String(get("mode", "strategy")).trim() || "—",
      setup:        String(get("setup")).trim(),
      entryTime:    String(get("entry_time", "entrytime", "entry_time_et")).trim(),
      entryPrice:   num(get("entry_price", "entry$", "entry")),
      currentPrice: num(get("current_price", "current$", "current")),
      qty:          num(get("qty", "quantity")),
      cost:         num(get("cost$", "cost")),
      uPnl:         uPnlDollar,
      uPnlPct:      uPnlPct,
      stop:         num(get("stop_price", "stop$", "stop")),
      target:       num(get("target_price", "target$", "target")),
      trailing:     num(get("trailing_stop$", "trailingstop", "trailing")),
      beMoved:      /yes|true|1/i.test(String(get("be_moved", "bemoved"))),
      ageMin:       num(get("age_min", "ageminutes", "age")),
      updatedEt:    String(get("updated_et", "updatedet", "updated")).trim(),
    };
  }).filter(p => p.ticker); // drop blank rows
}

function toSheetsCsvUrl(url) {
  const u = url.trim();
  // Case 1: already a published CSV (File → Publish to web → CSV). Pass through.
  //   e.g. https://docs.google.com/spreadsheets/d/e/2PACX-.../pub?gid=...&output=csv
  if (/\/spreadsheets\/d\/e\//.test(u) || /output=csv/.test(u)) {
    // If user pasted the HTML publish URL without output=csv, tack it on
    if (!/output=csv/.test(u)) {
      return u + (u.includes("?") ? "&" : "?") + "output=csv";
    }
    return u;
  }
  // Case 2: edit URL → rewrite to /export. Note: this path is CORS-restricted
  // from file:// — you'll need localhost or to use a published URL instead.
  const m = u.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (!m) return u;
  const id = m[1];
  const gidMatch = u.match(/[?&#]gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : "0";
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}

function Dashboard() {
  const [trades, setTrades] = useState(DEFAULT_TRADES);
  const [dataSource, setDataSource] = useState("sample"); // sample | csv | sheets
  const [tickerFilter, setTickerFilter] = useState("ALL");
  const [strategyFilter, setStrategyFilter] = useState("ALL");
  const [dateRange, setDateRange] = useState("ALL"); // ALL | TODAY | YESTERDAY | WEEK | MONTH
  const [sheetsUrl, setSheetsUrl] = useState("");
  const [linkedUrl, setLinkedUrl] = useState(""); // URL currently linked for refresh
  // Open Positions: second sheet tab URL + parsed positions
  const [positionsUrl, setPositionsUrl] = useState("");
  const [linkedPosUrl, setLinkedPosUrl] = useState("");
  const [openPositions, setOpenPositions] = useState([]);
  const [loadMsg, setLoadMsg] = useState("");
  const [loadState, setLoadState] = useState("idle"); // idle | loading | ok | error
  const [search, setSearch] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [autoRefresh, setAutoRefresh] = useState(false);
  // Trade log sort: key is column, dir is "asc"|"desc". Default: most recent first.
  const [sortBy, setSortBy] = useState({ key: "ts", dir: "desc" });
  // Time scatter chart: display trade results as $ or % of entry value
  const [scatterUnit, setScatterUnit] = useState("dollar"); // "dollar" | "percent"
  const fileRef = useRef(null);

  // Restore both linked URLs from localStorage
  useEffect(() => {
    try {
      const saved = localStorage.getItem(LS_URL);
      if (saved) { setSheetsUrl(saved); setLinkedUrl(saved); }
      const savedPos = localStorage.getItem(LS_URL_POS);
      if (savedPos) { setPositionsUrl(savedPos); setLinkedPosUrl(savedPos); }
    } catch (e) { /* no localStorage in this context */ }
  }, []);

  const { allTickers, allStrategies } = useMemo(() => {
    const t = new Set(), s = new Set();
    trades.forEach(tr => { if (tr.ticker) t.add(tr.ticker); if (tr.mode) s.add(tr.mode); });
    return { allTickers: [...t].sort(), allStrategies: [...s].sort() };
  }, [trades]);

  // Anchor date ranges on the most recent trade date in the dataset
  // (so TODAY/WEEK/MONTH are meaningful on weekends when markets are closed).
  const anchorDate = useMemo(() => {
    if (!trades.length) return new Date();
    const maxTs = Math.max(...trades.map(t => t.ts || 0));
    return maxTs ? new Date(maxTs) : new Date();
  }, [trades]);

  // Return inclusive start-of-day timestamp for a range relative to anchorDate
  const rangeStartMs = useMemo(() => {
    const d = new Date(anchorDate);
    d.setHours(0, 0, 0, 0);
    if (dateRange === "TODAY")     return d.getTime();
    if (dateRange === "YESTERDAY") return d.getTime() - 86400_000;
    if (dateRange === "WEEK")      return d.getTime() - 6 * 86400_000; // last 7 days inclusive
    if (dateRange === "MONTH")     return d.getTime() - 29 * 86400_000; // last 30 days inclusive
    return null; // ALL
  }, [anchorDate, dateRange]);

  const rangeEndMs = useMemo(() => {
    if (dateRange !== "YESTERDAY") return null; // no upper bound for other ranges
    const d = new Date(anchorDate);
    d.setHours(0, 0, 0, 0);
    return d.getTime(); // yesterday = [yesterday 00:00, today 00:00)
  }, [anchorDate, dateRange]);

  const filtered = useMemo(() => {
    return trades.filter(t => {
      if (tickerFilter !== "ALL" && t.ticker !== tickerFilter) return false;
      if (strategyFilter !== "ALL" && t.mode !== strategyFilter) return false;
      if (rangeStartMs !== null && t.ts < rangeStartMs) return false;
      if (rangeEndMs !== null && t.ts >= rangeEndMs) return false;
      if (search && !(`${t.ticker} ${t.setup} ${t.reason} ${t.mode}`.toLowerCase().includes(search.toLowerCase()))) return false;
      return true;
    });
  }, [trades, tickerFilter, strategyFilter, rangeStartMs, rangeEndMs, search]);

  const sortedAsc = useMemo(
    () => [...filtered].sort((a, b) => a.ts - b.ts),
    [filtered]
  );

  // Sorted copy for the trade log — respects the user's column/direction pick.
  const logSorted = useMemo(() => {
    const { key, dir } = sortBy;
    const mult = dir === "asc" ? 1 : -1;
    const getVal = (t) => {
      if (key === "ts") return t.ts;
      if (key === "pnl") return t.pnl;
      if (key === "entry") return t.entry;
      if (key === "exit") return t.exit;
      if (key === "qty") return t.qty;
      // string columns
      return String(t[key] || "").toLowerCase();
    };
    return [...filtered].sort((a, b) => {
      const va = getVal(a), vb = getVal(b);
      if (va < vb) return -1 * mult;
      if (va > vb) return  1 * mult;
      // Secondary sort: always break ties by timestamp desc so same-minute trades stay intuitive
      return (b.ts - a.ts);
    });
  }, [filtered, sortBy]);

  const toggleSort = (key) => {
    setSortBy(prev => {
      if (prev.key === key) return { key, dir: prev.dir === "asc" ? "desc" : "asc" };
      // New column: pick a sensible default direction
      const defaultDesc = ["ts", "pnl", "entry", "exit", "qty"].includes(key);
      return { key, dir: defaultDesc ? "desc" : "asc" };
    });
  };

  const stats = useMemo(() => {
    const total = filtered.reduce((s, t) => s + t.pnl, 0);
    const wins = filtered.filter(t => t.pnl > 0);
    const losses = filtered.filter(t => t.pnl <= 0);
    const winRate = filtered.length ? (wins.length / filtered.length * 100) : 0;
    const grossW = wins.reduce((s, t) => s + t.pnl, 0);
    const grossL = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
    const pf = grossL > 0 ? (grossW / grossL) : (grossW > 0 ? Infinity : 0);
    const avgW = wins.length ? grossW / wins.length : 0;
    const avgL = losses.length ? grossL / losses.length : 0;
    const expectancy = filtered.length ? total / filtered.length : 0;
    const best = filtered.length ? Math.max(...filtered.map(t => t.pnl)) : 0;
    const worst = filtered.length ? Math.min(...filtered.map(t => t.pnl)) : 0;

    let running = 0, peak = 0, maxDD = 0;
    const equity = sortedAsc.map((t, i) => {
      running += t.pnl;
      peak = Math.max(peak, running);
      const dd = running - peak;
      maxDD = Math.min(maxDD, dd);
      return { i: i + 1, eq: +running.toFixed(2), dd: +dd.toFixed(2), date: t.date };
    });

    let curStreak = 0, curType = null, bestW = 0, worstL = 0;
    sortedAsc.forEach(t => {
      const type = t.pnl > 0 ? "W" : "L";
      if (type === curType) curStreak++;
      else { curType = type; curStreak = 1; }
      if (type === "W") bestW = Math.max(bestW, curStreak);
      else worstL = Math.max(worstL, curStreak);
    });

    return { total, wins: wins.length, losses: losses.length, winRate, pf, avgW, avgL, expectancy, best, worst, equity, maxDD, curStreak, curType, bestW, worstL };
  }, [filtered, sortedAsc]);

  const dailyPnl = useMemo(() => {
    const m = {};
    filtered.forEach(t => { m[t.date] = (m[t.date] || 0) + t.pnl; });
    return Object.entries(m).sort().map(([d, p]) => ({ date: d.slice(5), pnl: +p.toFixed(2) }));
  }, [filtered]);

  const hourlyPnl = useMemo(() => {
    const m = {};
    filtered.forEach(t => {
      const h = parseInt((t.time || "00:00").slice(0, 2), 10);
      if (!Number.isFinite(h)) return;
      if (!m[h]) m[h] = { hour: h, pnl: 0, trades: 0 };
      m[h].pnl += t.pnl; m[h].trades++;
    });
    return Object.values(m).sort((a, b) => a.hour - b.hour).map(r => ({
      ...r, pnl: +r.pnl.toFixed(2),
      label: `${String(r.hour).padStart(2, "0")}:00`
    }));
  }, [filtered]);

  // Break-even threshold: trades within this $ magnitude count as break-even (amber).
  // Small enough that real wins/losses stand out, large enough to catch rounding noise.
  const BE_THRESHOLD_USD = 0.50;

  // Scatter points for the time-of-day chart. X is hour-of-day in ET as a decimal (e.g. 9.517 = 09:31).
  // Y is either dollar P&L or percent of entry cost, user-selectable.
  const timeScatter = useMemo(() => {
    return filtered.map(t => {
      const [hh, mm, ss = "0"] = (t.time || "00:00").split(":");
      let hourOfDay = (parseInt(hh, 10) || 0) + (parseInt(mm, 10) || 0) / 60 + (parseInt(ss, 10) || 0) / 3600;
      // Defensive: if time parsing somehow produced a nonsense value, clamp to [0, 24)
      // so one malformed row can't destroy the axis for everyone else.
      if (!Number.isFinite(hourOfDay) || hourOfDay < 0 || hourOfDay >= 24) hourOfDay = 0;
      const cost = (t.entry || 0) * (t.qty || 0);
      const pct = cost > 0 ? (t.pnl / cost) * 100 : 0;
      // Categorize: amber for break-even, green/red for winners/losers
      let category;
      if (Math.abs(t.pnl) < BE_THRESHOLD_USD) category = "be";
      else if (t.pnl > 0) category = "win";
      else category = "loss";
      return {
        x: hourOfDay,
        pnlDollar: +t.pnl.toFixed(2),
        pnlPercent: +pct.toFixed(3),
        category,
        // Fields below are used only for tooltip display
        ticker: t.ticker,
        mode: t.mode,
        setup: t.setup,
        date: t.date,
        time: t.time,
        id: t.id,
      };
    });
  }, [filtered]);

  // Partition for separate Scatter series so each gets its own legend color
  const scatterSeries = useMemo(() => ({
    wins:   timeScatter.filter(p => p.category === "win"),
    losses: timeScatter.filter(p => p.category === "loss"),
    be:     timeScatter.filter(p => p.category === "be"),
  }), [timeScatter]);

  const scatterYKey = scatterUnit === "percent" ? "pnlPercent" : "pnlDollar";
  const scatterYFmt = (v) => {
    if (scatterUnit === "percent") return `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`;
    return `${v >= 0 ? "+" : "−"}$${Math.abs(v).toFixed(2)}`;
  };

  const groupBy = (keyFn) => {
    const m = {};
    filtered.forEach(t => {
      const k = keyFn(t);
      if (!m[k]) m[k] = { key: k, trades: 0, pnl: 0, wins: 0 };
      m[k].trades++; m[k].pnl += t.pnl; if (t.pnl > 0) m[k].wins++;
    });
    return Object.values(m).map(r => ({ ...r, pnl: +r.pnl.toFixed(2), wr: r.trades ? (r.wins / r.trades * 100) : 0 }));
  };
  const byTicker   = useMemo(() => groupBy(t => t.ticker).sort((a, b) => b.pnl - a.pnl), [filtered]);
  const byStrategy = useMemo(() => groupBy(t => t.mode).sort((a, b) => b.pnl - a.pnl), [filtered]);
  const byReason   = useMemo(() => groupBy(t => t.reason || "—").sort((a, b) => b.trades - a.trades), [filtered]);

  // "Latest day" = the date portion of the anchor (most recent trade timestamp)
  const mostRecentDate = useMemo(() => {
    if (!trades.length) return "";
    const d = anchorDate;
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }, [trades, anchorDate]);
  const todayTrades = filtered.filter(t => t.date === mostRecentDate);
  const todayPnl = todayTrades.reduce((s, t) => s + t.pnl, 0);
  const todayWins = todayTrades.filter(t => t.pnl > 0).length;

  // ─── Import handlers ────────────────────────────────────────────────────
  const loadCsvText = (text) => {
    try {
      const { trades: parsed, skipped } = csvToTrades(text);
      if (!parsed.length) { setLoadState("error"); setLoadMsg("No valid trades found in CSV."); return false; }
      setTrades(parsed);
      setLoadState("ok");
      setLoadMsg(skipped > 0
        ? `Loaded ${parsed.length} trades. Skipped ${skipped} row${skipped === 1 ? "" : "s"} with missing date/ticker.`
        : `Loaded ${parsed.length} trades.`);
      setLastRefresh(Date.now());
      return true;
    } catch (e) {
      setLoadState("error"); setLoadMsg(`Parse failed: ${e.message}`);
      return false;
    }
  };

  const onFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      if (loadCsvText(String(r.result || ""))) {
        setDataSource("csv");
        setLinkedUrl(""); // file import clears sheet link
        setTimeout(() => setShowImport(false), 600);
      }
    };
    r.onerror = () => { setLoadState("error"); setLoadMsg("File read failed."); };
    r.readAsText(f);
  };

  // Core fetch — used by both "Link Sheet" and the refresh button
  const fetchFromSheets = useCallback(async (url, { silent = false } = {}) => {
    if (!url) return false;
    if (!silent) { setLoadState("loading"); setLoadMsg("Fetching…"); }
    try {
      const csvUrl = toSheetsCsvUrl(url.trim());
      // cache-bust so refresh always pulls fresh
      const busted = csvUrl + (csvUrl.includes("?") ? "&" : "?") + "_t=" + Date.now();
      const res = await fetch(busted, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (text.includes("<!DOCTYPE html>") || text.includes("<html")) {
        throw new Error("Got HTML instead of CSV. The sheet isn't public, or you used an /edit URL that returned a login page. Use File → Publish to web → CSV.");
      }
      const ok = loadCsvText(text);
      if (ok) setDataSource("sheets");
      return ok;
    } catch (e) {
      setLoadState("error");
      // fetch() throws TypeError on CORS / network failure — give a useful tip
      const isNetErr = e instanceof TypeError || /Failed to fetch|NetworkError|CORS/i.test(e.message || "");
      const openedFromFile = typeof window !== "undefined" && window.location.protocol === "file:";
      if (isNetErr) {
        if (openedFromFile) {
          setLoadMsg("Network error — browsers block fetch() from file:// URLs. Either (1) File → Publish to web → CSV in Sheets and paste that URL, or (2) serve this file from localhost: run `python3 -m http.server 8000` in the folder, then open http://localhost:8000/dashboard.html");
        } else {
          setLoadMsg("Network error — the sheet isn't reachable. Use File → Share → Publish to web → CSV, and paste the /pub?...output=csv URL here.");
        }
      } else {
        setLoadMsg(e.message);
      }
      return false;
    }
  }, []);

  const linkSheet = async () => {
    if (!sheetsUrl.trim()) return;
    const ok = await fetchFromSheets(sheetsUrl);
    if (ok) {
      setLinkedUrl(sheetsUrl.trim());
      try { localStorage.setItem(LS_URL, sheetsUrl.trim()); } catch (e) {}
      setTimeout(() => setShowImport(false), 600);
    }
  };

  // Fetch the Open Positions tab. Silent mode avoids flashing the top-level
  // loadMsg since positions update frequently and the existing "Loaded 82 trades"
  // banner shouldn't be stomped on.
  const fetchPositions = useCallback(async (url) => {
    if (!url) return;
    try {
      const csvUrl = toSheetsCsvUrl(url.trim());
      const busted = csvUrl + (csvUrl.includes("?") ? "&" : "?") + "_t=" + Date.now();
      const res = await fetch(busted, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (text.includes("<!DOCTYPE html>") || text.includes("<html")) {
        // Positions tab isn't published — clear silently rather than alarming
        setOpenPositions([]);
        return;
      }
      setOpenPositions(csvToOpenPositions(text));
    } catch (e) {
      // Network hiccup — keep existing positions visible rather than clearing
      console.warn("Positions fetch failed:", e.message);
    }
  }, []);

  const linkPositions = async () => {
    if (!positionsUrl.trim()) return;
    await fetchPositions(positionsUrl);
    setLinkedPosUrl(positionsUrl.trim());
    try { localStorage.setItem(LS_URL_POS, positionsUrl.trim()); } catch (e) {}
  };

  const refresh = async () => {
    if (!linkedUrl) { setShowImport(true); return; }
    // Fetch trades and positions in parallel
    await Promise.all([
      fetchFromSheets(linkedUrl),
      linkedPosUrl ? fetchPositions(linkedPosUrl) : Promise.resolve(),
    ]);
  };

  const unlink = () => {
    setLinkedUrl(""); setSheetsUrl(""); setAutoRefresh(false);
    try { localStorage.removeItem(LS_URL); } catch (e) {}
  };

  const unlinkPositions = () => {
    setLinkedPosUrl(""); setPositionsUrl(""); setOpenPositions([]);
    try { localStorage.removeItem(LS_URL_POS); } catch (e) {}
  };

  // Auto-refresh timer — also picks up position changes
  useEffect(() => {
    if (!autoRefresh || !linkedUrl) return;
    const id = setInterval(() => {
      fetchFromSheets(linkedUrl, { silent: true });
      if (linkedPosUrl) fetchPositions(linkedPosUrl);
    }, 60_000);
    return () => clearInterval(id);
  }, [autoRefresh, linkedUrl, linkedPosUrl, fetchFromSheets, fetchPositions]);

  // On initial load, if a positions URL was restored from localStorage, fetch it
  useEffect(() => {
    if (linkedPosUrl) fetchPositions(linkedPosUrl);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [linkedPosUrl]);

  const resetToSample = () => {
    setTrades(DEFAULT_TRADES); setDataSource("sample");
    setLoadState("idle"); setLoadMsg(""); setLastRefresh(null);
    setTickerFilter("ALL"); setStrategyFilter("ALL"); setDateRange("ALL"); setSearch("");
    setSortBy({ key: "ts", dir: "desc" });
    setOpenPositions([]);
  };

  // ─── Small pieces ───────────────────────────────────────────────────────
  const PnlText = ({ value, bold = false, size }) => (
    <span style={{
      color: value > 0 ? T.green : value < 0 ? T.red : T.textMid,
      fontWeight: bold ? 700 : 500, fontSize: size,
      fontVariantNumeric: "tabular-nums",
    }}>
      {value > 0 ? "+" : value < 0 ? "−" : ""}${Math.abs(value).toFixed(2)}
    </span>
  );

  const Chip = ({ active, onClick, color, children, count }) => (
    <button onClick={onClick} style={{
      padding: "6px 12px", fontSize: "10.5px", borderRadius: "6px",
      border: active ? `1px solid ${color || T.blue}` : `1px solid ${T.border}`,
      background: active ? `${color || T.blue}22` : T.panel,
      color: active ? (color || T.blueLi) : T.textMid,
      cursor: "pointer", letterSpacing: "1px",
      fontWeight: active ? 600 : 500,
      transition: "all 120ms ease",
      display: "inline-flex", alignItems: "center", gap: "6px",
    }}>
      {active && <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: color || T.blue }} />}
      {children}
      {count != null && <span style={{ color: T.textFaint, fontSize: "9px" }}>{count}</span>}
    </button>
  );

  const Panel = ({ title, right, children, style }) => (
    <div style={{
      background: T.panelHi, border: `1px solid ${T.border}`, borderRadius: "10px",
      padding: "16px", ...style,
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "12px", gap: "12px" }}>
        <div style={{ fontSize: "9.5px", letterSpacing: "2.5px", color: T.textDim, fontWeight: 600 }}>{title}</div>
        {right}
      </div>
      {children}
    </div>
  );

  const tooltipStyle = {
    background: "#0f172aee", border: `1px solid ${T.borderHi}`,
    borderRadius: "6px", fontSize: "11px", color: T.text,
  };

  const statusLabel = dataSource === "sample" ? "SAMPLE DATA" : dataSource === "csv" ? "CSV IMPORT" : "GOOGLE SHEETS";
  const statusColor = dataSource === "sample" ? T.amber : T.green;

  return (
    <div style={{ background: T.bg, color: T.text, minHeight: "100vh" }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #0b1220 0%, #141f3a 100%)",
        borderBottom: `1px solid ${T.border}`, padding: "18px 24px",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "16px" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "3px", color: T.textDim, marginBottom: "4px" }}>
              ALPHA HUNTER <span style={{ color: T.textFaint }}>/ v3.1</span>
            </div>
            <div style={{ fontSize: "22px", fontWeight: 700, color: "#f1f5f9", letterSpacing: "-0.3px" }}>
              Trading Dashboard
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
            {/* Status pill */}
            <div style={{
              padding: "5px 10px", fontSize: "9.5px", letterSpacing: "1.5px",
              border: `1px solid ${T.border}`, borderRadius: "6px", color: T.textMid,
              display: "inline-flex", alignItems: "center", gap: "6px",
            }}>
              <span className={loadState === "loading" ? "" : "pulse"} style={{
                width: "6px", height: "6px", borderRadius: "50%",
                background: statusColor, boxShadow: `0 0 8px ${statusColor}`,
              }} />
              {statusLabel}
              <span style={{ color: T.textFaint }}>· {trades.length} trades</span>
              {lastRefresh && dataSource === "sheets" && (
                <span style={{ color: T.textFaint }}>· <TimeAgo ts={lastRefresh} /></span>
              )}
              {linkedPosUrl && openPositions.length > 0 && (
                <span style={{
                  color: T.amber, fontWeight: 600,
                  borderLeft: `1px solid ${T.border}`,
                  paddingLeft: "8px", marginLeft: "2px",
                }}>
                  ● {openPositions.length} open
                </span>
              )}
            </div>

            {/* Refresh (only when linked) */}
            {linkedUrl && (
              <button
                onClick={refresh}
                disabled={loadState === "loading"}
                title="Reload trades from the linked Google Sheet"
                style={{
                  padding: "6px 12px", fontSize: "10.5px",
                  border: `1px solid ${T.green}55`,
                  background: `${T.green}18`, color: T.green, borderRadius: "6px",
                  cursor: loadState === "loading" ? "wait" : "pointer",
                  letterSpacing: "1px", fontWeight: 600,
                  display: "inline-flex", alignItems: "center", gap: "6px",
                }}
              >
                <span className={loadState === "loading" ? "spin" : ""} style={{ display: "inline-block" }}>↻</span>
                REFRESH
              </button>
            )}

            {/* Auto-refresh toggle */}
            {linkedUrl && (
              <button
                onClick={() => setAutoRefresh(v => !v)}
                title="Auto-refresh every 60 seconds"
                style={{
                  padding: "6px 10px", fontSize: "10px",
                  border: `1px solid ${autoRefresh ? T.green : T.border}`,
                  background: autoRefresh ? `${T.green}15` : "transparent",
                  color: autoRefresh ? T.green : T.textMid,
                  borderRadius: "6px", cursor: "pointer", letterSpacing: "1px",
                }}
              >
                AUTO {autoRefresh ? "ON" : "OFF"}
              </button>
            )}

            <button onClick={() => setShowImport(s => !s)} style={{
              padding: "6px 12px", fontSize: "10.5px", border: `1px solid ${T.borderHi}`,
              background: showImport ? T.borderHi : T.panel, color: T.text, borderRadius: "6px",
              cursor: "pointer", letterSpacing: "1px", fontWeight: 600,
            }}>
              {showImport ? "CLOSE" : (linkedUrl ? "SETTINGS" : "IMPORT DATA")}
            </button>

            {dataSource !== "sample" && (
              <button onClick={resetToSample} style={{
                padding: "6px 10px", fontSize: "10px", border: `1px solid ${T.border}`,
                background: "transparent", color: T.textMid, borderRadius: "6px", cursor: "pointer",
              }}>RESET</button>
            )}
          </div>
        </div>

        {/* Import drawer */}
        {showImport && (
          <div style={{
            marginTop: "14px", padding: "14px", background: "#080d18",
            border: `1px solid ${T.border}`, borderRadius: "8px",
          }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
              {/* CSV */}
              <div>
                <div style={{ fontSize: "9.5px", letterSpacing: "2px", color: T.textDim, marginBottom: "8px" }}>
                  CSV FILE (ONE-TIME IMPORT)
                </div>
                <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={onFile} style={{ display: "none" }} />
                <button onClick={() => fileRef.current?.click()} style={{
                  width: "100%", padding: "10px", fontSize: "11px",
                  border: `1px dashed ${T.borderHi}`, background: "transparent",
                  color: T.text, borderRadius: "6px", cursor: "pointer", letterSpacing: "1px",
                }}>
                  ↑ Choose CSV file
                </button>
                <div style={{ fontSize: "9.5px", color: T.textFaint, marginTop: "6px", lineHeight: 1.5 }}>
                  Expects the bot's <code style={{ color: T.textMid }}>sheets.py</code> schema. Headers matched case-insensitively.
                </div>
              </div>

              {/* Google Sheets */}
              <div>
                <div style={{ fontSize: "9.5px", letterSpacing: "2px", color: T.textDim, marginBottom: "8px" }}>
                  GOOGLE SHEETS {linkedUrl && <span style={{ color: T.green }}>· LINKED</span>}
                </div>
                <div style={{ display: "flex", gap: "6px" }}>
                  <input
                    type="text" value={sheetsUrl}
                    onChange={e => setSheetsUrl(e.target.value)}
                    placeholder="Paste the Publish to web CSV URL (…/pub?…&output=csv)"
                    style={{
                      flex: 1, padding: "8px 10px", fontSize: "10.5px",
                      border: `1px solid ${T.border}`, background: T.bg,
                      color: T.text, borderRadius: "6px", outline: "none",
                    }}
                  />
                  <button onClick={linkSheet} disabled={loadState === "loading"} style={{
                    padding: "8px 14px", fontSize: "10.5px", border: `1px solid ${T.blue}`,
                    background: `${T.blue}22`, color: T.blueLi, borderRadius: "6px",
                    cursor: loadState === "loading" ? "wait" : "pointer",
                    letterSpacing: "1px", fontWeight: 600,
                  }}>
                    {loadState === "loading" ? "…" : (linkedUrl ? "RELINK" : "LINK")}
                  </button>
                  {linkedUrl && (
                    <button onClick={unlink} style={{
                      padding: "8px 12px", fontSize: "10.5px", border: `1px solid ${T.border}`,
                      background: "transparent", color: T.textMid, borderRadius: "6px", cursor: "pointer",

        {/* Hero metrics */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: "10px", marginBottom: "16px" }}>

            { label: "TOTAL P&L", value: <PnlText value={+stats.total.toFixed(2)} bold size="20px" />, sub: `${filtered.length} trades` },
            { label: "LATEST DAY", value: <PnlText value={+todayPnl.toFixed(2)} bold size="20px" />, sub: `${mostRecentDate.slice(5)} · ${todayTrades.length} trades (${todayWins}W)` },

            { label: "EXPECTANCY", value: <PnlText value={+stats.expectancy.toFixed(2)} bold size="20px" />, sub: "per trade" },
            { label: "MAX DRAWDOWN", value: <span style={{ color: T.red, fontWeight: 700, fontSize: "20px", fontVariantNumeric: "tabular-nums" }}>−${Math.abs(stats.maxDD).toFixed(2)}</span>, sub: `best +$${stats.best.toFixed(2)} / worst −$${Math.abs(stats.worst).toFixed(2)}` },

            <div style={{ fontSize: "10px", color: T.textDim }}>

              <AreaChart data={stats.equity} margin={{ top: 4, right: 8, left: -6, bottom: 0 }}>
                <defs>
                  <linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={stats.total >= 0 ? T.green : T.red} stopOpacity={0.35} />
                    <stop offset="100%" stopColor={stats.total >= 0 ? T.green : T.red} stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="2 4" stroke={T.border} />
                <XAxis dataKey="i" tick={{ fill: T.textFaint, fontSize: 10 }} axisLine={{ stroke: T.border }} tickLine={{ stroke: T.border }} />

                <Tooltip contentStyle={tooltipStyle}

                <Tooltip contentStyle={tooltipStyle} formatter={(v) => [`$${Number(v).toFixed(2)}`, "DD"]} labelFormatter={(i) => `Trade #${i}`} />

              </AreaChart>
            </ResponsiveContainer>
          </Panel>

                  <ReferenceLine y={0} stroke={T.borderHi} />
                  <Bar dataKey="pnl" radius={[3, 3, 0, 0]} isAnimationActive={false}>
                    {hourlyPnl.map((d, i) => (<Cell key={i} fill={d.pnl >= 0 ? T.green : T.red} fillOpacity={0.85} />))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            ) : <div style={{ color: T.textFaint, fontSize: "11px" }}>No data</div>}
          </Panel>
        </div>

        {/* Time-of-day scatter: each dot is one trade, X=hour-of-day ET, Y=result */}

          title={`TRADE RESULTS BY TIME OF DAY · ${timeScatter.length} trades`}

            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              {/* Legend */}
              <div style={{ display: "inline-flex", gap: "10px", fontSize: "9.5px", color: T.textDim, letterSpacing: "1px" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
                  <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: T.green, display: "inline-block" }} />

                <span style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
                  <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: T.amber, display: "inline-block" }} />

                </span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
                  <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: T.red, display: "inline-block" }} />

                    {u === "dollar" ? "$" : "%"}

                ))}

            </div>

          style={{ marginBottom: "16px" }}

          {timeScatter.length ? (

              <ScatterChart margin={{ top: 8, right: 16, left: -4, bottom: 8 }}>
                <CartesianGrid strokeDasharray="2 4" stroke={T.border} />
                <XAxis
                  type="number"
                  dataKey="x"
                  domain={[0, 24]}
                  ticks={[0, 2, 4, 6, 8, 9.5, 12, 14, 16, 18, 20, 22, 24]}
                  tick={{ fill: T.textFaint, fontSize: 10 }}
                  axisLine={{ stroke: T.border }}
                  tickLine={{ stroke: T.border }}
                  tickFormatter={(v) => {
                    const h = Math.floor(v);
                    const m = Math.round((v - h) * 60);
                    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;

                  label={{ value: "Time of day (ET)", position: "insideBottom", offset: -4, fill: T.textDim, fontSize: 10, letterSpacing: "1px" }}

                <YAxis

                  dataKey={scatterYKey}

                />

                <Tooltip

                  contentStyle={{

                    borderRadius: "6px", fontSize: "11px", color: T.text,

                    return (
                      <div style={{
                        background: "#0f172aee", border: `1px solid ${T.borderHi}`,
                        borderRadius: "6px", padding: "8px 10px", fontSize: "11px",

                        <div style={{ color: T.textDim, fontSize: "9.5px", letterSpacing: "1px", marginBottom: "4px" }}>
                          {p.date} {p.time} ET

                        <div style={{ fontWeight: 600, color: tickerColor(p.ticker), marginBottom: "2px" }}>
                          {p.ticker} <span style={{ color: modeColor(p.mode), fontSize: "10px" }}>· {p.mode}</span>
                        </div>
                        <div style={{ color: T.textMid, fontSize: "10px", marginBottom: "4px" }}>{p.setup}</div>
                        <div style={{ fontWeight: 700, color: p.pnlDollar > 0 ? T.green : p.pnlDollar < 0 ? T.red : T.amber }}>
                          {p.pnlDollar >= 0 ? "+" : "−"}${Math.abs(p.pnlDollar).toFixed(2)}
                          <span style={{ color: T.textDim, fontWeight: 400, marginLeft: "6px", fontSize: "10px" }}>
                            ({p.pnlPercent >= 0 ? "+" : ""}{p.pnlPercent.toFixed(2)}%)
                          </span>
                        </div>
                      </div>
                    );
                  }}
                />
                {/* Reference lines: zero (breakeven), market open (9:30 ET), market close (16:00 ET) */}
                <ReferenceLine y={0} stroke={T.borderHi} strokeDasharray="2 2" />

                <Scatter data={scatterSeries.wins}   fill={T.green} fillOpacity={0.85} stroke={T.green} strokeWidth={1} />
                <Scatter data={scatterSeries.be}     fill={T.amber} fillOpacity={0.85} stroke={T.amber} strokeWidth={1} />
                <Scatter data={scatterSeries.losses} fill={T.red}   fillOpacity={0.85} stroke={T.red}   strokeWidth={1} />
              </ScatterChart>
            </ResponsiveContainer>
          ) : <div style={{ color: T.textFaint, fontSize: "11px", padding: "20px 0", textAlign: "center" }}>No trades in this range.</div>}
        </Panel>

        {/* Breakdown tables */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "16px" }}>
          <Panel title="BY STRATEGY"><BreakdownTable rows={byStrategy} colorFn={modeColor} /></Panel>
          <Panel title="BY TICKER"><BreakdownTable rows={byTicker} colorFn={tickerColor} /></Panel>
          <Panel title="BY EXIT REASON"><BreakdownTable rows={byReason} colorFn={() => T.textMid} /></Panel>
        </div>

        {/* Trade log */}
        <Panel title={`TRADE LOG · ${filtered.length}`} right={
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="filter ticker / setup / reason…"
            style={{
              padding: "5px 10px", fontSize: "10.5px",
              border: `1px solid ${T.border}`, background: T.bg,
              color: T.text, borderRadius: "6px", outline: "none", width: "260px",
            }}
          />
        }>
          <div style={{ overflowX: "auto", maxHeight: "420px", overflowY: "auto" }}>
            <table style={{ width: "100%", fontSize: "11px", borderCollapse: "collapse", fontVariantNumeric: "tabular-nums" }}>
              <thead style={{ position: "sticky", top: 0, background: T.panelHi, zIndex: 1 }}>
                <tr style={{ color: T.textDim, borderBottom: `1px solid ${T.border}` }}>
                  <SortTh label="Date / Time" col="ts"     sortBy={sortBy} onClick={toggleSort} />
                  <SortTh label="Ticker"      col="ticker" sortBy={sortBy} onClick={toggleSort} />
                  <SortTh label="Strategy"    col="mode"   sortBy={sortBy} onClick={toggleSort} />
                  <SortTh label="Setup"       col="setup"  sortBy={sortBy} onClick={toggleSort} />
                  <SortTh label="Entry"       col="entry"  sortBy={sortBy} onClick={toggleSort} align="right" />
                  <SortTh label="Exit"        col="exit"   sortBy={sortBy} onClick={toggleSort} align="right" />
                  <SortTh label="Qty"         col="qty"    sortBy={sortBy} onClick={toggleSort} align="right" />
                  <SortTh label="P&L"         col="pnl"    sortBy={sortBy} onClick={toggleSort} align="right" />
                  <SortTh label="Reason"      col="reason" sortBy={sortBy} onClick={toggleSort} />
                  <th style={{ ...thStyle, textAlign: "center" }}>R</th>
                </tr>
              </thead>
              <tbody>
                {logSorted.map(t => (
                  <tr key={t.id} style={{ borderBottom: "1px solid #0f172a" }}>
                    <td style={{ ...tdStyle, color: T.textMid, whiteSpace: "nowrap" }}>
                      {t.date} <span style={{ color: T.textFaint }}>{t.time}</span>
                      <span style={{ color: T.textFaint, fontSize: "9px", marginLeft: "3px" }}>ET</span>
                    </td>
                    <td style={{ ...tdStyle, fontWeight: 600, color: tickerColor(t.ticker) }}>{t.ticker}</td>
                    <td style={tdStyle}>
                      <span style={{
                        background: `${modeColor(t.mode)}18`, color: modeColor(t.mode),
                        padding: "2px 7px", borderRadius: "4px", fontSize: "9.5px", fontWeight: 600,
                        letterSpacing: "0.5px",
                      }}>{t.mode}</span>
                    </td>
                    <td style={tdStyle}>
                      <span style={{ background: T.border, color: T.textMid, padding: "2px 7px", borderRadius: "4px", fontSize: "10px" }}>
                        {t.setup}
                      </span>
                    </td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>${formatPrice(t.entry)}</td>
                    <td style={{ ...tdStyle, textAlign: "right" }}>${formatPrice(t.exit)}</td>

                    <td style={{ ...tdStyle, color: T.textDim, fontSize: "10px" }}>{t.reason}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      {t.pnl > 0
                        ? <span style={{ color: T.green, fontWeight: 600, fontSize: "10px" }}>W</span>
                        : <span style={{ color: T.red,   fontWeight: 600, fontSize: "10px" }}>L</span>}
                    </td>
                  </tr>
                ))}
                {!filtered.length && (
                  <tr><td colSpan={10} style={{ padding: "40px", textAlign: "center", color: T.textFaint }}>
                    No trades match the current filters.
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        </Panel>

        <div style={{ textAlign: "center", padding: "20px", color: T.textFaint, fontSize: "9.5px", letterSpacing: "1.5px" }}>
          ALPHA HUNTER v3.1 · STRATEGY D + ETH + ORB + HA SCALPER
        </div>
      </div>
    </div>
  );
}

const thStyle = { padding: "8px", textAlign: "left", fontWeight: 500, fontSize: "10px", letterSpacing: "0.5px" };
const tdStyle = { padding: "7px 8px" };

function formatPrice(n) {
  if (!Number.isFinite(n)) return "0.00";
  if (Math.abs(n) >= 1) return n.toFixed(2);
  return n.toFixed(4);
}
function formatQty(n) {
  if (!Number.isFinite(n)) return "0";
  if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (n >= 1)    return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
  return n.toFixed(3);
}

// Count trades within a named date range, anchored on the given date.
// Keeps the date chip counts in sync with the filter logic.
function countInRange(trades, range, anchorDate) {
  if (range === "ALL") return trades.length;
  const d = new Date(anchorDate);
  d.setHours(0, 0, 0, 0);
  const startOfDay = d.getTime();
  let start, end = null;
  if (range === "TODAY")          start = startOfDay;
  else if (range === "YESTERDAY") { start = startOfDay - 86400_000; end = startOfDay; }
  else if (range === "WEEK")      start = startOfDay - 6 * 86400_000;
  else if (range === "MONTH")     start = startOfDay - 29 * 86400_000;
  else return trades.length;
  return trades.filter(t => t.ts >= start && (end === null || t.ts < end)).length;
}

// Self-contained: only this component re-renders each second, not the whole dashboard.
// This keeps Recharts from replaying its entry animation 60 times per minute.
function TimeAgo({ ts }) {
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);
  const s = Math.floor((Date.now() - ts) / 1000);
  let text;
  if (s < 5) text = "just now";
  else if (s < 60) text = `${s}s ago`;
  else {
    const m = Math.floor(s / 60);
    if (m < 60) text = `${m}m ago`;
    else text = `${Math.floor(m / 60)}h ${m % 60}m ago`;
  }
  return <span>{text}</span>;
}

// Clickable sortable table header. Shows arrow indicator for the active column.
function SortTh({ label, col, sortBy, onClick, align = "left" }) {
  const active = sortBy.key === col;
  const arrow = active ? (sortBy.dir === "asc" ? "↑" : "↓") : "";
  return (
    <th
      onClick={() => onClick(col)}
      style={{
        ...thStyle,
        textAlign: align,
        cursor: "pointer",
        userSelect: "none",
        color: active ? "#e4e9f0" : undefined,
        transition: "color 120ms ease",
      }}
      title={`Sort by ${label}`}
    >
      <span style={{ display: "inline-flex", alignItems: "center", gap: "4px", justifyContent: align === "right" ? "flex-end" : align === "center" ? "center" : "flex-start", width: "100%" }}>
        {label}
        <span style={{
          fontSize: "10px",
          color: active ? "#60a5fa" : "#334155",
          width: "8px",
          display: "inline-block",
        }}>{arrow || "·"}</span>
      </span>
    </th>
  );
}

function BreakdownTable({ rows, colorFn }) {
  if (!rows.length) return <div style={{ color: "#475569", fontSize: "11px", padding: "8px 0" }}>No data</div>;
  return (
    <table style={{ width: "100%", fontSize: "11px", borderCollapse: "collapse", fontVariantNumeric: "tabular-nums" }}>
      <thead>
        <tr style={{ color: "#64748b", borderBottom: "1px solid #1a2332" }}>
          <td style={{ padding: "6px 0", textAlign: "left" }}>Name</td>
          <td style={{ textAlign: "right" }}>N</td>
          <td style={{ textAlign: "right" }}>P&amp;L</td>
          <td style={{ textAlign: "right" }}>WR</td>
        </tr>
      </thead>
      <tbody>
        {rows.map(r => (
          <tr key={r.key} style={{ borderBottom: "1px solid #0f172a" }}>
            <td style={{ padding: "7px 0", fontWeight: 600, color: colorFn(r.key) }}>{r.key}</td>
            <td style={{ textAlign: "right", color: "#94a3b8" }}>{r.trades}</td>
            <td style={{
              textAlign: "right",
              color: r.pnl > 0 ? "#10b981" : r.pnl < 0 ? "#ef4444" : "#94a3b8",
              fontWeight: 600,
            }}>
              {r.pnl > 0 ? "+" : r.pnl < 0 ? "−" : ""}${Math.abs(r.pnl).toFixed(2)}
            </td>
            <td style={{ textAlign: "right", color: r.wr >= 50 ? "#10b981" : "#ef4444" }}>
              {r.wr.toFixed(0)}%
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── Live Positions Panel ──────────────────────────────────────────────────
// Top-of-page card grid showing each currently-open position with live P&L.
// Data comes from the bot writing state to a dedicated sheet tab every ~30s.
function LivePositionsPanel({ positions, tickerColor, modeColor, T }) {
  const total = positions.length;
  const totalPnl = positions.reduce((s, p) => s + (p.uPnl || 0), 0);
  const winning = positions.filter(p => p.uPnl > 0).length;

  // Determine freshness — the bot writes "Updated ET" as HH:MM:SS each push
  // so we can tell users when positions data was last refreshed by the bot
  // (separate from when the dashboard last fetched the sheet).
  const staleMin = (() => {
    if (!positions.length) return null;
    const latest = positions.map(p => p.updatedEt).filter(Boolean).sort().reverse()[0];
    if (!latest) return null;
    try {
      const [h, m, s] = latest.split(":").map(Number);
      const now = new Date();
      const et = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
      }).format(now).split(":").map(Number);
      const updatedSec = h * 3600 + m * 60 + (s || 0);
      const nowSec = et[0] * 3600 + et[1] * 60 + et[2];
      // Handle day rollover: if "now" is earlier than "updated", the update was yesterday
      const diff = (nowSec - updatedSec + 86400) % 86400;
      return Math.floor(diff / 60);
    } catch (e) { return null; }
  })();

  return (
    <div style={{ marginBottom: "16px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px" }}>
        <div style={{ display: "inline-flex", alignItems: "center", gap: "10px" }}>
          <span style={{
            width: "8px", height: "8px", borderRadius: "50%",
            background: total > 0 ? T.amber : T.textFaint,
            boxShadow: total > 0 ? `0 0 10px ${T.amber}` : "none",
          }} className={total > 0 ? "pulse" : ""} />
          <span style={{ fontSize: "10px", letterSpacing: "2.5px", color: T.textMid, fontWeight: 600 }}>
            LIVE POSITIONS
          </span>
          <span style={{ fontSize: "10px", color: T.textFaint }}>
            {total === 0 ? "· flat" : `· ${total} open · ${winning}W`}
          </span>
          {total > 0 && (
            <span style={{
              fontSize: "11px", fontWeight: 700, letterSpacing: "0.5px",
              fontVariantNumeric: "tabular-nums",
              color: totalPnl > 0 ? T.green : totalPnl < 0 ? T.red : T.textMid,
            }}>
              {totalPnl >= 0 ? "+" : "−"}${Math.abs(totalPnl).toFixed(2)} unrealized
            </span>
          )}
        </div>
        {staleMin !== null && (
          <span style={{ fontSize: "9.5px", color: staleMin > 5 ? T.amber : T.textFaint, letterSpacing: "1px" }}>
            bot update: {staleMin === 0 ? "just now" : `${staleMin}m ago`}
            {staleMin > 5 && " ⚠"}
          </span>
        )}
      </div>

      {total === 0 ? (
        <div style={{
          background: T.panelHi, border: `1px dashed ${T.border}`, borderRadius: "10px",
          padding: "16px", textAlign: "center", color: T.textFaint, fontSize: "11px",
          letterSpacing: "1px",
        }}>
          No positions currently open. The bot is flat.
        </div>
      ) : (
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))",
          gap: "10px",
        }}>
          {positions.map(p => <PositionCard key={p.id} p={p} tickerColor={tickerColor} modeColor={modeColor} T={T} />)}
        </div>
      )}
    </div>
  );
}

function PositionCard({ p, tickerColor, modeColor, T }) {
  const winning = p.uPnl > 0;
  const losing = p.uPnl < 0;
  const accent = winning ? T.green : losing ? T.red : T.amber;

  // Stop / target / current price positions on a mini bar, for visual context
  // Only show if we have both a stop and a sensible price range
  const hasBar = p.stop && p.currentPrice && p.entryPrice;
  const barMin = hasBar ? Math.min(p.stop, p.entryPrice, p.currentPrice, p.target || Infinity) : 0;
  const barMax = hasBar ? Math.max(p.stop, p.entryPrice, p.currentPrice, p.target || 0) : 0;
  const pct = (v) => hasBar && barMax > barMin ? ((v - barMin) / (barMax - barMin)) * 100 : 0;

  return (
    <div style={{
      background: T.panelHi,
      border: `1px solid ${accent}33`,
      borderLeft: `3px solid ${accent}`,
      borderRadius: "8px",
      padding: "12px 14px",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Top row: ticker + strategy */}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: "6px" }}>
        <div style={{ display: "inline-flex", alignItems: "baseline", gap: "8px" }}>
          <span style={{ fontSize: "14px", fontWeight: 700, color: tickerColor(p.ticker), letterSpacing: "0.5px" }}>
            {p.ticker}
          </span>
          <span style={{
            fontSize: "9px", fontWeight: 600, letterSpacing: "0.5px",
            color: modeColor(p.mode), background: `${modeColor(p.mode)}18`,
            padding: "2px 6px", borderRadius: "3px",
          }}>
            {p.mode}
          </span>
        </div>
        <span style={{ fontSize: "9.5px", color: T.textFaint, letterSpacing: "0.5px" }}>
          {p.setup}
        </span>
      </div>

      {/* Main P&L display */}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: "8px" }}>
        <span style={{
          fontSize: "20px", fontWeight: 700,
          color: accent, fontVariantNumeric: "tabular-nums",
        }}>
          {p.uPnl >= 0 ? "+" : "−"}${Math.abs(p.uPnl).toFixed(2)}
        </span>
        <span style={{
          fontSize: "11px", fontWeight: 500,
          color: accent, fontVariantNumeric: "tabular-nums",
        }}>
          {p.uPnlPct >= 0 ? "+" : ""}{p.uPnlPct.toFixed(2)}%
        </span>
      </div>

      {/* Price detail grid */}
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 12px",
        fontSize: "10px", color: T.textDim, marginBottom: hasBar ? "10px" : "4px",
      }}>
        <div>
          <span style={{ color: T.textFaint }}>entry </span>
          <span style={{ color: T.text, fontVariantNumeric: "tabular-nums" }}>
            ${p.entryPrice < 1 ? p.entryPrice.toFixed(4) : p.entryPrice.toFixed(2)}
          </span>
        </div>
        <div>
          <span style={{ color: T.textFaint }}>now </span>
          <span style={{ color: T.text, fontVariantNumeric: "tabular-nums", fontWeight: 600 }}>
            ${p.currentPrice < 1 ? p.currentPrice.toFixed(4) : p.currentPrice.toFixed(2)}
          </span>
        </div>
        <div>
          <span style={{ color: T.textFaint }}>qty </span>
          <span style={{ color: T.text, fontVariantNumeric: "tabular-nums" }}>
            {p.qty >= 1000 ? p.qty.toLocaleString(undefined, { maximumFractionDigits: 0 }) :
             p.qty >= 1 ? p.qty.toLocaleString(undefined, { maximumFractionDigits: 2 }) :
             p.qty.toFixed(3)}
          </span>
        </div>
        <div>
          <span style={{ color: T.textFaint }}>age </span>
          <span style={{ color: T.text, fontVariantNumeric: "tabular-nums" }}>
            {p.ageMin ? `${p.ageMin}m` : "—"}
          </span>
        </div>
        {p.stop > 0 && (
          <div>
            <span style={{ color: T.textFaint }}>stop </span>
            <span style={{ color: T.red, fontVariantNumeric: "tabular-nums" }}>
              ${p.stop < 1 ? p.stop.toFixed(4) : p.stop.toFixed(2)}
            </span>
          </div>
        )}
        {p.target > 0 && (
          <div>
            <span style={{ color: T.textFaint }}>target </span>
            <span style={{ color: T.green, fontVariantNumeric: "tabular-nums" }}>
              ${p.target < 1 ? p.target.toFixed(4) : p.target.toFixed(2)}
            </span>
          </div>
        )}
      </div>

      {/* Mini price bar showing stop / entry / current / target positions */}
      {hasBar && (
        <div style={{ position: "relative", height: "4px", background: T.border, borderRadius: "2px", marginTop: "6px" }}>
          {/* Stop marker */}
          <div style={{
            position: "absolute", left: `${pct(p.stop)}%`, top: "-2px",
            width: "2px", height: "8px", background: T.red, borderRadius: "1px",
            transform: "translateX(-50%)",
          }} title={`stop $${p.stop.toFixed(2)}`} />
          {/* Entry marker */}
          <div style={{
            position: "absolute", left: `${pct(p.entryPrice)}%`, top: "-2px",
            width: "2px", height: "8px", background: T.textMid, borderRadius: "1px",
            transform: "translateX(-50%)",
          }} title={`entry $${p.entryPrice.toFixed(2)}`} />
          {/* Current price — bigger marker */}
          <div style={{
            position: "absolute", left: `${pct(p.currentPrice)}%`, top: "-3px",
            width: "8px", height: "10px", background: accent, borderRadius: "2px",
            transform: "translateX(-50%)",
            boxShadow: `0 0 6px ${accent}`,
          }} title={`now $${p.currentPrice.toFixed(2)}`} />
          {/* Target marker (if set) */}
          {p.target > 0 && (
            <div style={{
              position: "absolute", left: `${pct(p.target)}%`, top: "-2px",
              width: "2px", height: "8px", background: T.green, borderRadius: "1px",
              transform: "translateX(-50%)",
            }} title={`target $${p.target.toFixed(2)}`} />
          )}
        </div>
      )}

      {/* BE flag */}
      {p.beMoved && (
        <div style={{
          position: "absolute", top: "8px", right: "8px",
          fontSize: "8px", fontWeight: 700, letterSpacing: "1px",
          color: T.amber, background: `${T.amber}18`,
          padding: "2px 5px", borderRadius: "3px",
        }}>
          BE
        </div>
      )}
    </div>
  );
}

root.render(<Dashboard />);
